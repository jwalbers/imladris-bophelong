openmrs_db_password: ENC[PLACEHOLDER]

java_memory_parameters: '-Xmx4G -Xms2G'
backup_file_prefix: semonkong
az_backup_folder_path: lesotho/semonkong

remote_zlidentifier_url: 'http://bophelong.imladris.local/openmrs/module/idgen/exportIdentifiers.form?source=1&comment=semonkong'
