# HAProxy configuration — Oregon pfSense
# Baseline: ha.bipeds.org (Home Assistant)
# Added:    imladrislab.org (Imladris Lab — 6 subdomains)
#
# Generated on: 2026-06-04
# NOTE: This file is a reference draft. pfSense auto-generates
# /var/etc/haproxy/haproxy.cfg from its GUI — use this as the
# configuration target when entering settings in the pfSense HAProxy UI.
#
# Network topology:
#   pfSense LAN:  192.168.1.0/24
#   Mac (dev):    192.168.1.11  (wired via USB-C dock)
#   Windows:      192.168.1.10  (AdvaPACS Gateway + network controller)
#
# BEFORE APPLYING:
#   1. Install pfSense ACME package and obtain wildcard cert for
#      imladrislab.org + *.imladrislab.org (DNS-01 challenge)
#   2. Add the new cert to /var/etc/haproxy/HA_Frontend.crt_list
#   3. Update lab_user password hash (see note below userlist block)

global
    maxconn                 1000
    stats socket /tmp/haproxy.socket level admin  expose-fd listeners
    uid                     80
    gid                     80
    nbthread                1
    hard-stop-after         15m
    chroot                  /tmp/haproxy_chroot
    daemon
    server-state-file /tmp/haproxy_server_state

# ── Basic Auth users for Imladris Lab ────────────────────────────────────────
# To generate an encrypted password:
#   openssl passwd -apr1 'yourpassword'
# Then replace the insecure-password line with:
#   user imladris password $apr1$xxxx...
# Add one line per user. When Entra is wired up this block is removed.
userlist imladris_users
    user imladris insecure-password changeme

# ─────────────────────────────────────────────────────────────────────────────

listen HAProxyLocalStats
    bind 127.0.0.1:2200 name localstats
    mode http
    stats enable
    stats admin if TRUE
    stats show-legends
    stats uri /haproxy/haproxy_stats.php?haproxystats=1
    timeout client  5000
    timeout connect 5000
    timeout server  5000

# ── Single shared frontend ────────────────────────────────────────────────────
# HA_Frontend.crt_list must contain entries for:
#   ha.bipeds.org           (existing)
#   imladrislab.org         (new — wildcard *.imladrislab.org covers all subdomains)

frontend HA_Frontend
    bind            68.116.51.146:443 name 68.116.51.146:443 \
                        ssl crt-list /var/etc/haproxy/HA_Frontend.crt_list
    mode            http
    log             global
    option          http-keep-alive
    timeout client  50000

    http-request set-var(txn.txnhost) hdr(host)

    # ── Existing: ha.bipeds.org (Home Assistant) ──────────────────────────
    acl  is_ha              var(txn.txnhost) -m str -i ha.bipeds.org
    acl  aclcrt_HA_Frontend var(txn.txnhost) -m reg -i ^ha\.bipeds\.org(:([0-9]){1,5})?$

    # ── New: imladrislab.org ───────────────────────────────────────────────
    # Cert ACL — matches root domain and all subdomains
    acl  aclcrt_imladris    var(txn.txnhost) -m reg -i \
                                ^(imladrislab\.org|.*\.imladrislab\.org)(:([0-9]){1,5})?$

    # Per-subdomain host ACLs
    acl  is_imladris_landing    var(txn.txnhost) -m str -i imladrislab.org
    acl  is_imladris_openmrs    var(txn.txnhost) -m str -i openmrs.imladrislab.org
    acl  is_imladris_orthanc_m  var(txn.txnhost) -m str -i orthanc-m.imladrislab.org
    acl  is_imladris_orthanc_p  var(txn.txnhost) -m str -i orthanc-p.imladrislab.org
    acl  is_imladris_ohif       var(txn.txnhost) -m str -i ohif.imladrislab.org
    acl  is_imladris_console    var(txn.txnhost) -m str -i console.imladrislab.org

    # Basic auth gate — all lab subdomains.
    # OpenMRS is excluded (has its own login page); include it here if you
    # want a second factor in front of OpenMRS too.
    http-request auth realm "Imladris Lab" \
        if aclcrt_imladris \
           !{ http_auth(imladris_users) } \
           !is_imladris_openmrs

    # ── Routing ───────────────────────────────────────────────────────────
    use_backend HA_Server_ipvANY        if  is_ha              aclcrt_HA_Frontend
    use_backend Imladris_Landing        if  is_imladris_landing    aclcrt_imladris
    use_backend Imladris_OpenMRS        if  is_imladris_openmrs    aclcrt_imladris
    use_backend Imladris_OrtMod         if  is_imladris_orthanc_m  aclcrt_imladris
    use_backend Imladris_OrtPACS        if  is_imladris_orthanc_p  aclcrt_imladris
    use_backend Imladris_OHIF           if  is_imladris_ohif       aclcrt_imladris
    use_backend Imladris_Console        if  is_imladris_console    aclcrt_imladris

# ── Existing backend ──────────────────────────────────────────────────────────

backend HA_Server_ipvANY
    mode            http
    id              100
    log             global
    option          log-health-checks
    timeout connect 5s
    timeout server  50s
    timeout tunnel  1h
    retries         3
    load-server-state-from-file global
    server          ha 192.168.1.80:8123 id 101

# ── Imladris Lab backends ─────────────────────────────────────────────────────
# Replace 192.168.1.11 with your Mac's LAN IP on this network.

backend Imladris_Landing
    mode            http
    id              200
    log             global
    timeout connect 5s
    timeout server  30s
    option          forwardfor
    server          landing 192.168.1.11:8090 id 201

backend Imladris_OpenMRS
    mode            http
    id              210
    log             global
    timeout connect 10s
    timeout server  120s        # OpenMRS can be slow on first page load
    option          forwardfor
    # Pass real client IP — OpenMRS logs benefit from this
    http-request    set-header X-Forwarded-Proto https
    server          openmrs 192.168.1.11:8080 id 211

backend Imladris_OrtMod
    mode            http
    id              220
    log             global
    timeout connect 5s
    timeout server  60s
    timeout tunnel  1h          # DICOM transfers can run long
    option          forwardfor
    http-request    set-header X-Forwarded-Proto https
    server          orthanc_modality 192.168.1.11:8042 id 221

backend Imladris_OrtPACS
    mode            http
    id              230
    log             global
    timeout connect 5s
    timeout server  300s        # STOW-RS uploads (cine files) can be slow
    timeout tunnel  1h
    option          forwardfor
    http-request    set-header X-Forwarded-Proto https
    server          orthanc_pacs 192.168.1.11:8043 id 231

backend Imladris_OHIF
    mode            http
    id              240
    log             global
    timeout connect 5s
    timeout server  60s
    timeout tunnel  1h
    option          forwardfor
    http-request    set-header X-Forwarded-Proto https
    server          ohif 192.168.1.11:3000 id 241

backend Imladris_Console
    mode            http
    id              250
    log             global
    timeout connect 5s
    timeout server  60s
    option          forwardfor
    http-request    set-header X-Forwarded-Proto https
    server          console 192.168.1.11:5001 id 251
